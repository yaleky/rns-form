<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Yale RNS Saliva Study</title><style>body{font-family:system-ui,sans-serif;background:#f5f3ef;margin:0;line-height:1.6}.hd{background:#00356b;color:#fff;padding:1.2rem;text-align:center}.hd h1{margin:0;font-size:1.3rem}.hd p{margin:.2rem 0 0;opacity:.7;font-size:.8rem}.ct{max-width:600px;margin:0 auto;padding:1rem}.fc{background:#fff;border-radius:8px;padding:1.2rem;margin-bottom:.8rem;border:1px solid #ddd}.fc.h{display:none}label.fl{font-weight:600;display:block;margin-bottom:.4rem}.rq{color:#c62828}input[type=text],input[type=date],input[type=number],input[type=datetime-local],textarea{width:100%;padding:.6rem;border:1px solid #ccc;border-radius:6px;font-size:.95rem;box-sizing:border-box}textarea{min-height:70px}.ro{display:block;padding:.5rem .7rem;border:1px solid #ccc;border-radius:6px;margin-bottom:.4rem;cursor:pointer}.yn{display:flex;gap:.5rem}.yn .ro{flex:1;text-align:center}.fn{font-size:.75rem;color:#888;margin-top:.3rem}.sb{width:100%;padding:.8rem;background:#00356b;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer}.nt{background:#f5e6dc;border-left:4px solid #bd5319;padding:.8rem;margin-bottom:1rem;font-size:.85rem;color:#5a3010;border-radius:0 8px 8px 0}.pid{display:flex;align-items:center;gap:.4rem}.pid span{font-weight:700;font-size:1.1rem;color:#00356b}.pid input{flex:1}</style></head><body><div class="hd"><h1>Yale RNS Saliva Study</h1><p>Collection Form</p></div><div class="ct"><div class="nt"><b>Temporary form.</b> REDCap is down for maintenance. Your responses will be transferred when it is back online.</div><form action="https://formspree.io/f/xpqoqdbe" method="POST"><input type="hidden" name="_subject" value="RNS Collection Form Submission"><div class="fc"><label class="fl">Date <span class="rq">*</span></label><input type="date" name="date" id="dt" required></div><div class="fc"><label class="fl">Participant ID</label><div class="pid"><span>YRNS</span><input type="text" name="participant_id"></div></div><div class="fc"><label class="fl">Scheduled Collection Time <span class="rq">*</span></label><div class="rg"><label class="ro"><input type="radio" name="time_scheduled" value="Breakfast" required> Breakfast</label><label class="ro"><input type="radio" name="time_scheduled" value="Dinner"> Dinner</label><label class="ro"><input type="radio" name="time_scheduled" value="Before Bed"> Before Bed</label></div></div><div class="fc"><label class="fl">Was this sample collected? <span class="rq">*</span></label><div class="yn"><label class="ro"><input type="radio" name="sample_collected_yn" value="Yes" required> Yes</label><label class="ro"><input type="radio" name="sample_collected_yn" value="No"> No</label></div></div><div class="fc h" id="c3"><label class="fl">Sample Number <span class="rq">*</span></label><input type="number" name="sample_num" min="1" step="1"></div><div class="fc h" id="c4"><label class="fl">Time of Last Meal/Drink <span class="rq">*</span></label><input type="datetime-local" name="time_lastmd"></div><div class="fc h" id="c5"><label class="fl">Actual Time of Collection <span class="rq">*</span></label><input type="datetime-local" name="time_actual"><div class="fn">When you start spitting into the tube</div></div><div class="fc h" id="c6"><label class="fl">Did you collect at least 1mL? <span class="rq">*</span></label><div class="yn"><label class="ro"><input type="radio" name="sample_minimum" value="Yes"> Yes</label><label class="ro"><input type="radio" name="sample_minimum" value="No"> No</label></div></div><div class="fc"><label class="fl">Notes</label><textarea name="notes" placeholder="Optional notes..."></textarea></div><button type="submit" class="sb">Submit Collection</button></form></div><script>document.getElementById("dt").value=new Date().toISOString().split("T")[0];document.querySelectorAll("input[name=sample_collected_yn]").forEach(function(r){r.addEventListener("change",function(){var s=r.value==="Yes";["c3","c4","c5","c6"].forEach(function(id){document.getElementById(id).classList.toggle("h",!s)})})})</script></body></html>
